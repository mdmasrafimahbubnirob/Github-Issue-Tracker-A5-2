<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Github Issue Tracker</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style.css">

    <style>
        * {
            font-family: "Geist";
        }
    </style>

</head>
<!-- bg-base-200 -->

<body class="bg-base-300 min-h-screen items-center flex justify-center">
    <div class="bg-white w-full max-w-[400px] p-10 border border-amber-200 rounded-2xl shadow-xl">

        <div class="flex flex-col items-center mb-8">
            <img src="./assets/github-logo.png" alt="GitHub Logo" class="mb-4">

            <h1 class="text-2xl font-bold text-black">GitHub Issues Tracker</h1>
            <p class="text-sm text-gray-400 mt-1 text-center">Sign in to manage your issues</p>
        </div>

        <div class="space-y-4">
            <div>

                <label class="block text-sm font-semibold mb-2 text-black">Username</label>
                <input id="Enter-Username" type="text" placeholder="Enter Username"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md  text-sm">
                <span class="text-xs text-purple-500">Default: admin</span>

            </div>

            <div>

                <label class="block text-sm font-semibold mb-2 text-black">Password</label>
                <input id="password" type="password" placeholder="Enter Password"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md  text-sm">
                <span class="text-xs text-purple-500">Default: admin123</span>

            </div>

            <button id="Sign-In-btn"
                class="cursor-pointer w-full bg-purple-600 hover:bg-purple-800 text-white font-bold py-2.5 rounded-md shadow-2xl mt-2">
                Sign In
            </button>
        </div>

    </div>

    <script src="./script/login.js"></script>
</body>

</html>
