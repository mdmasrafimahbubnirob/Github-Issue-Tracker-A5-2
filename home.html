<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home | Github Issue Tracker</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style.css">

    <style>
        * {
            font-family: "Geist";
        }
    </style>

</head>

<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white border border-gray-300 px-4 md:px-8 py-3 flex flex-wrap items-center justify-between">
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" alt="" class="w-10 h-10">
            <h1 class="text-lg font-bold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-3 mt-2 md:mt-0 w-full md:w-auto">
            <div class="grow md:grow-0">
                <input type="text" placeholder="Search issues"
                    class="w-full pl-10 pr-4 py-1.5 border border-[#d0d7de] rounded-md text-sm outline-none focus:ring-2 focus:ring-blue-100">

            </div>

            <button
                class="bg-violet-600 hover:bg-violet-800 text-white px-4 py-1.5 rounded-md text-sm font-semibold whitespace-nowrap">
                New Issue
            </button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 md:p-8">

        <div class="bg-white border border-gray-300 p-4 rounded-xl mb-6 shadow-sm flex gap-2">
            <button class="bg-violet-600 text-white px-6 py-1.5 rounded-md text-sm font-medium">All</button>
            <button
                class="bg-white border border-gray-300 px-6 py-1.5 rounded-md text-sm font-medium text-black hover:bg-gray-100">Open</button>
            <button
                class="bg-white border border-gray-300 px-6 py-1.5 rounded-md text-sm font-medium text-black hover:bg-gray-100">Closed</button>
        </div>


    </main>



</body>

</html>
