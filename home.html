<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home | Github Issue Tracker</title>

    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./style.css">

    <style>
        * {
            font-family: "Geist";
        }
    </style>

</head>

<body class="bg-gray-100 min-h-screen">

    <nav class="bg-white border border-gray-300 px-4 md:px-8 py-3 flex flex-wrap items-center justify-between">
        <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" alt="" class="w-10 h-10">
            <h1 class="text-lg font-bold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex items-center gap-3 mt-2 md:mt-0 w-full md:w-auto">
            <div class="grow md:grow-0">
                <input type="text" placeholder="Search issues"
                    class="w-full pl-10 pr-4 py-1.5 border border-[#d0d7de] rounded-md text-sm outline-none focus:ring-2 focus:ring-blue-100">

            </div>

            <button
                class="bg-violet-600 hover:bg-violet-800 text-white px-4 py-1.5 rounded-md text-sm font-semibold whitespace-nowrap">
                New Issue
            </button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto p-4 md:p-8">

        <div class="bg-white border border-gray-300 p-4 rounded-xl mb-6 shadow-sm flex gap-2">

            <button onclick="Tab('all')" id="tab-all"
                class="border border-gray-300 px-6 py-1.5 rounded-md text-sm font-medium hover:bg-gray-100">All</button>

            <button onclick="Tab('open')" id="tab-open"
                class="border border-gray-300 px-6 py-1.5 rounded-md text-sm font-medium hover:bg-gray-100">Open</button>

            <button onclick="Tab('closed')" id="tab-closed"
                class="border border-gray-300 px-6 py-1.5 rounded-md text-sm font-medium hover:bg-gray-100">Closed</button>

        </div>

        <!-- mmmmmmmmmmmmmmmmmm -->
        <div class="bg-white border border-gray-300 rounded-t-xl p-6 flex flex-wrap justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-purple-100 rounded-full flex items-center justify-center text-[#5814ff]">
                    <img src="./assets/Aperture.png" alt="" srcset="">
                </div>

                <div>
                    <h2 class="text-xl font-bold text-black">0 Issues</h2>
                    <p class="text-sm text-gray-500">Track and manage your project issues</p>
                </div>
            </div>

            <div class="flex gap-4 text-sm">
                <span class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full"></span>
                    Open</span>
                <span class="flex items-center gap-2"><span class="w-3 h-3 bg-purple-500 rounded-full"></span>
                    Closed</span>
            </div>
        </div>



        <div id="issue-container"
            class="bg-white border border-gray-300 border-t-0 rounded-b-xl p-4 md:p-6 flex flex-wrap gap-4">

            <div id="all-section"
                class="hidden bg-white border border-gray-300 rounded-xl p-5 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden w-full md:w-[calc(50%-1rem)] lg:w-[calc(25%-1rem)] min-w-[280px]">

                <div class="h-1.5 w-full bg-green-400 absolute top-0 left-0"></div>

                <div class="flex justify-between items-start mb-4 mt-2">
                    <div class="w-7 h-7 rounded-full border-2 border-green-400 flex items-center justify-center">
                        <!-- <div class="w-2 h-2 bg-green-400 rounded-full"></div> -->
                        <img src="./assets/Open-Status.png" alt="" srcset="">
                    </div>
                    <span
                        class="text-[10px] font-bold px-2 py-1 rounded bg-red-50 text-red-500 tracking-wider">HIGH</span>
                </div>

                <h3 class="font-bold text-[#1f2328] text-[15px] mb-2 leading-tight">Fix Navigation Menu On Mobile
                    Devices</h3>
                <p class="text-xs text-[#636c76] mb-4 line-clamp-2 leading-relaxed">The navigation menu doesn't collapse
                    properly on mobile devices or tablets...</p>

                <div class="flex flex-wrap gap-2 mb-4">
                    <span
                        class="text-[10px] font-bold px-2 py-1 rounded bg-red-50 text-red-500 flex items-center gap-1 border border-red-100">
                        BUG
                    </span>
                    <span
                        class="text-[10px] font-bold px-2 py-1 rounded bg-yellow-200 text-yellow-500 flex items-center gap-1 border border-yellow-100">
                        HELP WANTED
                    </span>
                </div>

                <div class="pt-4 border-t border-gray-100 flex flex-col gap-1 text-[11px] text-gray-400">
                    <p class="font-medium text-gray-500">#1 by john_doe</p>
                    <p>1/15/2024</p>
                </div>
            </div>

            <section id="open-section" class="hidden">
                <h1>open</h1>
            </section>

            <section id="closed-section" class="hidden">
                <h1>closed</h1>
            </section>

        </div>


    </main>


    <script src="./script/home.js"></script>
</body>

</html>
